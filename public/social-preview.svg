<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Clean light background -->
  <rect width="1200" height="630" fill="#F8F9FB"/>
  
  <!-- Subtle tech dot matrix grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#111827" opacity="0.04"/>
    </pattern>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Ambient background glow -->
  <circle cx="600" cy="315" r="400" fill="url(#blueGlow)"/>

  <!-- Centered Premium Minimal Card (Vercel / Linear inspired) -->
  <g transform="translate(150, 95)">
    <!-- Card Border & Shadow base -->
    <rect width="900" height="440" rx="32" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" />
    <rect width="896" height="436" x="2" y="2" rx="30" fill="none" stroke="#2563EB" stroke-width="4" opacity="0.05" />
    
    <!-- Visual Accent Top Bar -->
    <rect width="120" height="6" x="390" y="0" rx="3" fill="#2563EB" opacity="0.8"/>

    <!-- Initials Badge / Icon at top left of card -->
    <g transform="translate(60, 60)">
      <rect width="64" height="64" rx="16" fill="#111827"/>
      <text x="32" y="36" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', 'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">AM</text>
    </g>
    
    <!-- Top right Location Info -->
    <g transform="translate(680, 75)">
      <text font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" fill="#4B5563" letter-spacing="1">KERALA, INDIA</text>
      <circle cx="-12" cy="-4" r="3.5" fill="#10B981" />
    </g>

    <!-- Main Typography Content -->
    <!-- Name -->
    <text x="60" y="200" font-family="'Space Grotesk', 'Plus Jakarta Sans', sans-serif" font-size="64" font-weight="800" fill="#111827" letter-spacing="-2">
      AVIKAM MANOJ
    </text>

    <!-- Subtitle (Title / Specialty) -->
    <text x="60" y="260" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="24" font-weight="600" fill="#4B5563" letter-spacing="-0.5">
      Software Engineer <tspan fill="#2563EB" font-weight="500">|</tspan> AI &amp; Data Science
    </text>

    <!-- Horizontal divider line -->
    <line x1="60" y1="310" x2="840" y2="310" stroke="#F3F4F6" stroke-width="2" />

    <!-- Tagline & Core details footer in card -->
    <g transform="translate(60, 370)">
      <!-- Left side Tagline -->
      <text font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#111827" letter-spacing="2">
        BUILD. GROW. SERVE.
      </text>
      <!-- Right side Tech list -->
      <text x="780" y="-3" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" fill="#9CA3AF">
        python • typescript • ml • react
      </text>
    </g>
  </g>
</svg>
